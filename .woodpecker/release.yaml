when:
  - event: tag

matrix:
  PROJECT:
    - Common.Mod
    - Common.Mod.Generator

steps:
  - name: bootstrap
    image: git.omni.ms/omnilium/toolbox:latest
    environment:
      COPYPARTY_USER:
        from_secret: copyparty_user
      COPYPARTY_PASSWORD:
        from_secret: copyparty_password
    commands:
      - bash scripts/fetch-game.sh $${COPYPARTY_USER} $${COPYPARTY_PASSWORD}
      - bash scripts/bootstrap.sh

  - name: archive
    image: mcr.microsoft.com/dotnet/sdk:9.0
    commands:
      - bash build.sh --target Archive --oproject ${PROJECT} --oversion ${CI_COMMIT_TAG}

  - name: release
    image: woodpeckerci/plugin-release:latest
    settings:
      api-key:
        from_secret: forgejo_release_key
      files:
        - out/*.zip
      draft: true
